<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="order.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">    
    <title>Order</title>
</head>
<body>
    
<section class="info-section1" id="contact">

    <div class="container">
        <div class="menu-grid">
            <div class="pizza-card-about">
                <div class="pizza-info">

                    <a id="hero-button-order" href="index.html">&larr; Back</a>                        

                    <h2>Place Your Order</h2>
                    
                    <p>Name: <br>
                    <textarea id="name" name="name" rows="2" cols="30" placeholder="John"></textarea>
                    </p>

                    <p>Surname: <br>
                    <textarea id="surname" name="surname" rows="2" cols="30" placeholder="Doe"></textarea>
                    </p>

                    <p>Mobile Number: <br>
                    <textarea id="number" name="subject" rows="2" cols="30" placeholder="+27 123 456 7890"></textarea>
                    </p>

                    <p>Select Order Type:
                        <select name="order-choice" id="order-choice">
                            <option value="#">-- Select--</option>
                            <option value="pizza">Pizza Only</option>
                        </select>
                    </p>

                    <!-- Pizza Builder Section -->
                    <div hidden id="pizza-builder-section">
                        <hr>
                        <h3>🍕 Pizza Selection</h3>

                        <!-- Pizza Items List -->
                        <div id="pizza-items-list"></div>

                        <!-- Add Another Pizza Button -->
                        <button type="button" id="add-pizza-btn" style="margin-bottom:12px; font-size:16px; padding:8px 16px; cursor:pointer;">
                            + Add Another Pizza
                        </button>
                        <hr>
                    </div>

                    <p>Add a Message or Special Request: <br>
                    <textarea id="special" name="special" rows="10" cols="25" placeholder="No Garnishes"></textarea>    
                    </p>

                    <!-- Total Price -->
                    <h3 id="total-price">Total: R0</h3>

                    <button id="confirm-order" style="font-size:24px">Place Order Via <i class="fa fa-whatsapp"></i></button>    

                </div>
            </div>
        </div>
    </div>
       
</section>

</body>
    <script src="order.js" defer></script>
</html>
